<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>엔젤 건강 가이드</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --main-green: #2D5A27;
            --light-green: #4CAF50;
            --bg-green: #F1F8E9;
            --white: #ffffff;
            --text-gray: #666;
            --border-light: #eee;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-green);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .info-container {
            width: 100%;
            max-width: 480px;
        }

        .header {
            margin-bottom: 20px;
            text-align: center;
        }

        .header h2 { color: var(--main-green); font-size: 22px; }

        /* 📑 탭 메뉴 스타일 */
        .tab-menu {
            display: flex;
            background: #e8f0e5;
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            color: var(--text-gray);
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: var(--white);
            color: var(--main-green);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* 📋 목록 스타일 */
        .health-list { display: flex; flex-direction: column; gap: 12px; }

        .health-card {
            background: var(--white);
            padding: 18px;
            border-radius: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-content span { font-size: 11px; color: var(--light-green); font-weight: 700; }
        .card-content h4 { font-size: 15px; color: #333; margin-top: 4px; }
        .date { font-size: 12px; color: #bbb; }

        /* ----------------------------------------------
           ✨ 상세 모달 (Layer)
        ---------------------------------------------- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 400px;
            border-radius: 24px;
            padding: 25px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-badge {
            display: inline-block;
            padding: 4px 10px;
            background: var(--bg-green);
            color: var(--main-green);
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .modal-title { font-size: 19px; color: #222; margin-bottom: 15px; line-height: 1.4; }
        .modal-body {
            font-size: 14.5px;
            line-height: 1.7;
            color: #444;
            border-top: 1px solid var(--border-light);
            padding-top: 15px;
        }
        .modal-body strong { color: var(--main-green); }

        .close-btn {
            margin-top: 25px;
            width: 100%;
            padding: 15px;
            background: var(--main-green);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="info-container">
    <div class="header">
        <h2>건강 가이드 센터</h2>
    </div>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('recipe', this)">레시피 제공</button>
        <button class="tab-btn" onclick="switchTab('exercise', this)">운동 가이드</button>
    </div>

    <div class="health-list" id="healthList">
        </div>
</div>

<div class="modal-overlay" id="healthModal">
    <div class="modal-content">
        <div id="modal-category" class="modal-badge">카테고리</div>
        <h3 id="modal-title" class="modal-title">제목</h3>
        <div class="modal-body" id="modal-body"></div>
        <button class="close-btn" onclick="closeModal()">확인</button>
    </div>
</div>

<script>
    // 🗂️ 데이터 통합 관리
    const healthData = {
        recipe: [
            {
                tag: "#해독 #ABC쥬스",
                title: "내 몸을 비우는 ABC 해독 레시피",
                date: "12.19",
                category: "레시피 정보",
                content: "사과(A), 비트(B), 당근(C)을 준비하세요. <strong>사과 1 : 비트 0.3 : 당근 1</strong> 비율로 착즙하는 것이 핵심입니다. 비트의 옥살산 성분 때문에 비트는 살짝 익혀서 사용하는 것이 간 건강에 더욱 좋습니다."
            },
            {
                tag: "#피부보습 #이너뷰티",
                title: "피부 탄력을 높이는 석류 케일 주스",
                date: "12.15",
                category: "레시피 정보",
                content: "석류의 에스트로겐과 케일의 비타민 K가 만나면 <strong>피부 재생 속도</strong>를 높여줍니다. 석류 씨앗까지 압착하여 추출하는 엔젤 녹즙기를 활용하면 영양을 극대화할 수 있습니다."
            }
        ],
        exercise: [
            {
                tag: "#유산소 #아침운동",
                title: "지방 연소를 돕는 20분 공복 걷기",
                date: "12.18",
                category: "운동 가이드",
                content: "아침 공복에 마시는 물 한 잔 후 <strong>20분간 가벼운 산책</strong>을 해보세요. 공복 운동은 체내 축적된 지방을 에너지원으로 먼저 사용하여 다이어트 효율을 2배 이상 높여줍니다."
            },
            {
                tag: "#스트레칭 #오운완",
                title: "잠들기 전 5분 소화 촉진 스트레칭",
                date: "12.12",
                category: "운동 가이드",
                content: "하루 종일 앉아 있었다면 <strong>고양이 자세와 비틀기 동작</strong>을 추천합니다. 이 동작은 장기를 자극하여 소화를 돕고 숙면을 취할 수 있는 몸 상태를 만들어줍니다."
            }
        ]
    };

    // 🔄 탭 전환 함수
    function switchTab(type, btn) {
        // 버튼 활성화 표시
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // 목록 초기화 및 렌더링
        const listDiv = document.getElementById('healthList');
        listDiv.innerHTML = '';

        healthData[type].forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'health-card';
            card.onclick = () => showHealthDetail(type, index);
            card.innerHTML = `
                <div class="card-content">
                    <span>${item.tag}</span>
                    <h4>${item.title}</h4>
                </div>
                <div class="date">${item.date}</div>
            `;
            listDiv.appendChild(card);
        });
    }

    // 🔍 상세 보기 모달
    function showHealthDetail(type, index) {
        const data = healthData[type][index];
        document.getElementById('modal-category').innerText = data.category;
        document.getElementById('modal-title').innerText = data.title;
        document.getElementById('modal-body').innerHTML = data.content;
        
        document.getElementById('healthModal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('healthModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    // 초기 화면 실행 (레시피 탭 기본 활성화)
    switchTab('recipe', document.querySelector('.tab-btn'));

    // 배경 클릭 시 닫기
    window.onclick = function(event) {
        if (event.target == document.getElementById('healthModal')) closeModal();
    }
</script>

</body>
</html>
