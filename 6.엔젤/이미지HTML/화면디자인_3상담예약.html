<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상담 및 예약 페이지</title>
    <style>
        /* 기본 스타일 초기화 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --main-green: #2D5A27;
            --light-green: #4CAF50;
            --bg-green: #F1F8E9;
            --white: #ffffff;
            --booked-red: #ef5350;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-green);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .page-container {
            width: 100%;
            max-width: 400px;
            background: var(--white);
            padding: 30px 20px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .section-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
            text-align: left;
        }

        .call-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 20px;
            background-color: var(--white);
            border: 2px solid var(--main-green);
            border-radius: 16px;
            color: var(--main-green);
            text-decoration: none;
            margin-bottom: 25px;
            transition: transform 0.2s;
        }

        .call-btn:active { transform: scale(0.98); background-color: #f9fdf5; }
        .call-btn .label { font-size: 14px; margin-bottom: 5px; }
        .call-btn .phone { font-size: 24px; font-weight: 800; }

        /* 버튼 공통 스타일 */
        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 12px;
        }

        .reserve-open-btn {
            background-color: var(--main-green);
            color: white;
        }

        /* 🔎 나의 예약 보기 버튼 */
        .my-reserve-btn {
            background-color: white;
            color: var(--main-green);
            border: 1px solid var(--main-green);
            font-size: 16px;
            padding: 15px;
        }

        .btn:active { transform: scale(0.98); opacity: 0.9; }

        /* ----------------------------------------------
           ✨ 공통 모달 스타일
        ---------------------------------------------- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 340px;
            border-radius: 24px;
            padding: 25px;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-header {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            color: var(--main-green);
            text-align: center;
        }

        /* 예약 목록 아이템 스타일 */
        .reserve-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .reserve-info {
            font-size: 14px;
            color: #333;
        }

        .cancel-btn {
            background: #ffeded;
            color: var(--booked-red);
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        /* 기존 예약 그리드 스타일 */
        .grid-label { font-size: 13px; font-weight: 600; margin: 15px 0 8px; color: #444; }
        .selection-grid { display: grid; gap: 8px; }
        .date-grid { grid-template-columns: repeat(4, 1fr); }
        .time-grid { grid-template-columns: repeat(3, 1fr); }
        .item {
            padding: 12px 5px; font-size: 13px; background: #f5f5f5;
            border-radius: 10px; cursor: pointer; text-align: center; transition: 0.2s;
        }
        .item.booked { background: #ffebee; color: var(--booked-red); cursor: not-allowed; text-decoration: line-through; }
        .item.selected { background: var(--light-green); color: white; font-weight: bold; }

        .confirm-btn { margin-top: 25px; width: 100%; padding: 15px; background: var(--main-green); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .close-btn { margin-top: 10px; width: 100%; padding: 12px; background: none; border: none; color: #888; cursor: pointer; text-decoration: underline; font-size: 13px; }
    </style>
</head>
<body>

<div class="page-container">
    <div class="section-title">빠른 전화 연결</div>
    <a href="tel:02-1234-5678" class="call-btn">
        <span class="label">상담하기</span>
        <span class="phone">02-1234-5678</span>
    </a>

    <div class="section-title">방문 예약</div>
    <button class="btn reserve-open-btn" onclick="openModal('reserveModal')">날짜 선택 및 예약</button>
    <button class="btn my-reserve-btn" onclick="openMyReservations()">나의 예약 보기</button>
</div>

<div class="modal-overlay" id="reserveModal">
    <div class="modal-content">
        <div class="modal-header">방문 일정 선택</div>
        <div class="grid-label">날짜 (12월)</div>
        <div class="selection-grid date-grid">
            <div class="item" onclick="selectItem(this)">22일</div>
            <div class="item booked">23일</div>
            <div class="item" onclick="selectItem(this)">24일</div>
            <div class="item" onclick="selectItem(this)">25일</div>
        </div>
        <div class="grid-label">시간</div>
        <div class="selection-grid time-grid">
            <div class="item" onclick="selectItem(this)">10:00</div>
            <div class="item booked">11:00</div>
            <div class="item" onclick="selectItem(this)">14:00</div>
            <div class="item" onclick="selectItem(this)">15:00</div>
            <div class="item" onclick="selectItem(this)">16:00</div>
        </div>
        <button class="confirm-btn" onclick="completeReserve()">예약 확정하기</button>
        <button class="close-btn" onclick="closeModal('reserveModal')">닫기</button>
    </div>
</div>

<div class="modal-overlay" id="myReserveModal">
    <div class="modal-content">
        <div class="modal-header">나의 예약 내역</div>
        <div id="reservation-list">
            </div>
        <button class="close-btn" onclick="closeModal('myReserveModal')">닫기</button>
    </div>
</div>

<script>
    // 임시 데이터 저장소 (실제 앱에서는 서버나 LocalStorage 사용)
    let myReservations = [
        { id: 1, date: "12월 22일", time: "10:00" }
    ];

    function openModal(id) {
        document.getElementById(id).style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function selectItem(element) {
        const siblings = element.parentElement.children;
        for (let sibling of siblings) {
            sibling.classList.remove('selected');
        }
        element.classList.add('selected');
    }

    // 예약 확정 로직
    function completeReserve() {
        const selectedDate = document.querySelector('.date-grid .selected');
        const selectedTime = document.querySelector('.time-grid .selected');

        if (!selectedDate || !selectedTime) {
            alert('날짜와 시간을 모두 선택해 주세요.');
            return;
        }

        const newReserve = {
            id: Date.now(),
            date: `12월 ${selectedDate.innerText}`,
            time: selectedTime.innerText
        };

        myReservations.push(newReserve);
        alert('예약이 성공적으로 등록되었습니다.');
        closeModal('reserveModal');
    }

    // 나의 예약 목록 렌더링 및 모달 열기
    function openMyReservations() {
        const listContainer = document.getElementById('reservation-list');
        listContainer.innerHTML = '';

        if (myReservations.length === 0) {
            listContainer.innerHTML = '<p style="text-align:center; color:#999; padding:20px;">예약된 내역이 없습니다.</p>';
        } else {
            myReservations.forEach(res => {
                const item = document.createElement('div');
                item.className = 'reserve-item';
                item.innerHTML = `
                    <div class="reserve-info">
                        <strong>${res.date}</strong> / ${res.time}
                    </div>
                    <button class="cancel-btn" onclick="cancelReservation(${res.id})">취소</button>
                `;
                listContainer.appendChild(item);
            });
        }
        openModal('myReserveModal');
    }

    // 예약 취소 로직
    function cancelReservation(id) {
        if (confirm('정말 예약을 취소하시겠습니까?')) {
            myReservations = myReservations.filter(res => res.id !== id);
            openMyReservations(); // 목록 새로고침
        }
    }

    // 배경 클릭 시 닫기 처리
    window.onclick = function(event) {
        if (event.target.classList.contains('modal-overlay')) {
            event.target.style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    }
</script>

</body>
</html>
