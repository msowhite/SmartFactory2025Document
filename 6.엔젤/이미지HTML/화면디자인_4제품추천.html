<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>엔젤 맞춤 건강 솔루션</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --angel-green: #2D5A27; /* 엔젤 브랜드 톤 */
            --point-gold: #C5A059; /* 프리미엄 골드 포인트 */
            --bg-green: #F1F8E9;
            --white: #ffffff;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-green);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--white);
            padding: 30px 20px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h2 { color: var(--angel-green); margin-bottom: 25px; text-align: center; }
        .question-title { font-size: 15px; font-weight: 600; margin: 15px 0 8px; color: #444; }

        select {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #ddd;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background-color: var(--angel-green);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
        }

        /* ----------------------------------------------
           ✨ 추천 결과 레이어 모달
        ---------------------------------------------- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 380px;
            border-radius: 24px;
            padding: 25px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .item-card {
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .item-card:hover { border-color: var(--point-gold); background: #faf9f5; }
        .badge { font-size: 10px; padding: 3px 8px; border-radius: 5px; color: white; margin-bottom: 5px; display: inline-block; }
        .badge-juicer { background: var(--angel-green); }
        .badge-recipe { background: var(--point-gold); }

        .item-info h4 { font-size: 15px; color: #333; }
        .item-info p { font-size: 12px; color: #888; }

        /* 상세 설명 섹션 */
        .desc-area {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #fdfdfd;
            border: 1px dashed var(--point-gold);
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
        }

        .close-btn { width: 100%; padding: 12px; background: #eee; border: none; border-radius: 12px; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>Angel 맞춤 솔루션</h2>
    
    <div class="question-title">❓ 현재 가장 필요한 도움은?</div>
    <select id="user-goal">
        <option value="machine">최고급 녹즙기 모델 추천</option>
        <option value="detox">디톡스/해독 레시피</option>
        <option value="immunity">면역력 강화 레시피</option>
    </select>

    <div class="question-title">💰 선호하는 가격/구성대</div>
    <select id="user-price">
        <option value="1">합리적인 엔트리 구성</option>
        <option value="2">베스트셀러 스탠다드</option>
        <option value="3">프리미엄 하이엔드</option>
    </select>

    <button class="submit-btn" onclick="getAngelRecommend()">추천 결과 보기</button>
</div>

<div class="modal-overlay" id="angelModal">
    <div class="modal-content">
        <h3 id="modal-title" style="color: var(--angel-green); text-align: center;">맞춤 추천 리스트</h3>
        <div id="result-list" style="margin-top: 20px;"></div>

        <div id="detail-box" class="desc-area">
            <h5 id="detail-name" style="color: var(--point-gold); margin-bottom: 8px;"></h5>
            <p id="detail-text"></p>
        </div>

        <button class="close-btn" onclick="closeModal()">닫기</button>
    </div>
</div>

<script>
    const data = [
        { type: 'juicer', category: 'machine', price: '2', name: "엔젤 녹즙기 5500", desc: "스테인리스 304 재질의 가장 대중적인 모델입니다. 착즙 효율이 뛰어나며 가정용으로 최적화되어 있습니다." },
        { type: 'juicer', category: 'machine', price: '3', name: "엔젤 녹즙기 8500", desc: "최고급 스테인리스 316(의료용) 재질을 사용하여 부식에 강하며 최고의 내구성을 자랑하는 프리미엄 모델입니다." },
        { type: 'recipe', category: 'detox', price: '1', name: "ABC 해독 쥬스 레시피", desc: "사과(A), 비트(B), 당근(C)을 1:0.3:1 비율로 착즙하세요. 간 해독과 혈액 순환에 탁월합니다." },
        { type: 'recipe', category: 'immunity', price: '1', name: "진저 케일 면역 쥬스", desc: "케일 5장, 생강 1쪽, 사과 1개를 함께 착즙하세요. 강력한 항염 작용과 면역력 증진에 도움을 줍니다." }
    ];

    function getAngelRecommend() {
        const goal = document.getElementById('user-goal').value;
        const listDiv = document.getElementById('result-list');
        const detailBox = document.getElementById('detail-box');
        
        listDiv.innerHTML = '';
        detailBox.style.display = 'none';

        const filtered = data.filter(item => item.category === goal);

        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = 'item-card';
            const badgeClass = item.type === 'juicer' ? 'badge-juicer' : 'badge-recipe';
            const badgeLabel = item.type === 'juicer' ? '녹즙기' : '레시피';

            card.innerHTML = `
                <div class="item-info">
                    <span class="badge ${badgeClass}">${badgeLabel}</span>
                    <h4>${item.name}</h4>
                    <p>클릭하여 상세 정보 확인</p>
                </div>
            `;
            card.onclick = () => {
                detailBox.style.display = 'block';
                document.getElementById('detail-name').innerText = item.name;
                document.getElementById('detail-text').innerText = item.desc;
            };
            listDiv.appendChild(card);
        });

        document.getElementById('angelModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('angelModal').style.display = 'none'; }
</script>

</body>
</html>
